<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14.5 Практика работы с JSON и LocalStorage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="film-form">
        <label for="title">Название:</label>
            <input type="text" id="title" name="title"/>
        <label for="genre">Жанр:</label>
            <input type="text" id="genre" name="genre"/>
        <label for="releaseYear">Год: </label>
            <input type="text" id="releaseYear" name="releaseYear"/>
        <div class="range-btn">
            <label for="range">Оценка:<span id="rangeValue">0</span></label>
            <input type="range" id="range" name="range" min="1" max="10" step="0.1" value="0"/>

            <button type="submit" class="add-btn">Добавить</button>
        </div>
    </form>
    <form id="search-film">
        <label for="title">
            <input type="text" id="searchText" name="title" oninput="extendedSearch()" placeholder="Название">
        </label>
        <label for="genre">
            <input type="text" id="searchGenre" name="genre" oninput="extendedSearch()" placeholder="Жанр">
        </label>
        <label for="releaseYear">
            <input type="text" id="searchRYear" name="releaseYear" oninput="extendedSearch()" placeholder="Год релиза">
        </label>
        <!-- <label for="Btn">
            <button type="button" id="search-button">Поиск</button>
        </label> -->
    </form>
    <div class="table-wrapper">
        <table id="film-table">
    <thead class="table-th">
        <tr>
            <th>Movie</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Grade</th>
            <th>viewed</th>
            <th>⚙️🗑️</th>
        </tr>
    </thead>
    <tbody id="film-tbody">
            <!-- Rows will be inserted here -->
        </tbody>
    </table>
    </div>
    <script src="sandbox.js"></script>
</body>
</html>
